name: cygwin-action-workflow
on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
      - 'c*'
      
permissions:
    contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ windows-latest ] # , ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    env:
      libraryName: iperf3
      tagName: 3.21
    defaults:
      run:
        shell: C:\tools\cygwin\bin\bash.exe --login -o igncr '{0}'
    # env:
    #   libraryName: libgpg-error
    #   installationPath: libgpg-error-installation
    #   mingwTargetZip: libgpg-error-${{ github.ref_name }}-mingw64-x86_64-posix-seh-rev0-8.1.0.zip
    steps:
      #       tagName: libgpg-error-1.47
      # - name: git clone
      #   shell: cmd
      #   run: git clone --recurse-submodules https://dev.gnupg.org/source/libgpg-error.git && cd libgpg-error && git checkout ${{ env.tagName }}
      
      - shell: cmd
        run: git config --global core.autocrlf false
      
      - uses: actions/checkout@v6
        with:
          repository: esnet/iperf
          ref: ${{ env.tagName }}
          path: ${{ env.libraryName }}
          submodules: true
          fetch-depth: 0 # <-- clone with complete history
          
      - name: Set up Cygwin
        uses: egor-tensin/setup-cygwin@v4
        with:
          packages: autoconf automake libtool gcc-g++ gcc-core make openssl libssl-devel cygwin-devel pkg-config openssl-devel
      
    # 
    #  LDFLAGS="-Wl,-no-undefined"
      - working-directory: ${{ env.libraryName }}
        run: |
          g++ --version && \
          mkdir installation && \
          ./bootstrap.sh && \
          ./configure --help && \
          ./configure --prefix="$(pwd)/installation" && \
          make && \
          make install

      - shell: cmd
        run: xcopy /H /Y /C "C:\tools\cygwin\bin\cygwin1.dll" "${{ env.libraryName }}\installation\bin"

      - shell: cmd
        run: xcopy /H /Y /C "C:\tools\cygwin\bin\cygcrypto-3.dll" "${{ env.libraryName }}\installation\bin"

      - shell: cmd
        run: xcopy /H /Y /C "C:\tools\cygwin\bin\cygz.dll" "${{ env.libraryName }}\installation\bin"
        
      - shell: cmd
        run: xcopy /H /Y /C "${{ github.workspace }}\${{ env.libraryName }}\examples\mic.exe" "${{ env.libraryName }}\installation\bin"
        
      - shell: cmd
        run: xcopy /H /Y /C "${{ github.workspace }}\${{ env.libraryName }}\examples\mis.exe" "${{ env.libraryName }}\installation\bin"

      - shell: cmd
        run: |
          cd "${{ env.libraryName }}\installation" &&^
          dir /S
        
      - name: Archive Release
        uses: thedoctor0/zip-release@master
        with:
          type: 'zip'
          directory: "${{ env.libraryName }}/installation"
          filename: "${{ env.libraryName }}-${{ github.ref_name }}-cygwin.zip"
        
      - name: Release prebuilt
        uses: ncipollo/release-action@v1
        with:
          artifacts: "${{ env.libraryName }}/installation/${{ env.libraryName }}-${{ github.ref_name }}-cygwin.zip"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
